name: Feature request
description: Suggest an improvement or new capability
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: Thanks for the idea. The clearer the problem, the better the solution.

  - type: checkboxes
    id: preflight
    attributes:
      label: Before you file
      options:
        - label: I searched existing issues and this isn't already requested.
          required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Collection (finding media)
        - Original-quality upgrades / resolvers
        - Filtering
        - Downloading / naming
        - Download history
        - Deep scan
        - Settings
        - On-page bubble
        - Other
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do that's hard or impossible today?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like the extension to do?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches or workarounds you've tried.

  - type: input
    id: site
    attributes:
      label: Example site (if relevant)
      description: A page where this would help — useful for collection/resolver requests.

  - type: checkboxes
    id: contribute
    attributes:
      label: Contribution
      options:
        - label: I'd be willing to open a PR for this.
          required: false
