name: Release

# Fires when a version tag is pushed (e.g. `v1.1.0`). It re-validates, packages
# all browser zips, publishes a GitHub Release with them attached, and pushes the
# Chrome build to the Chrome Web Store.
#
# Required repository secrets for the Chrome Web Store publish (Settings →
# Secrets and variables → Actions). If they are absent the publish step is
# SKIPPED (the release still succeeds), so the workflow is safe to add before
# the secrets exist:
#   CHROME_EXTENSION_ID    the item id (jmdhkdengijmmkelofaleinbipophckn)
#   CHROME_CLIENT_ID       OAuth client id  (Chrome Web Store API)
#   CHROME_CLIENT_SECRET   OAuth client secret
#   CHROME_REFRESH_TOKEN   OAuth refresh token
# See docs/CHROME_WEBSTORE.md and https://developer.chrome.com/docs/webstore/using-api

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write # create the GitHub Release + upload assets

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Enable Corepack
        run: corepack enable
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: yarn
      - name: Install dependencies
        run: yarn install --immutable
      - name: Lint
        run: yarn lint
      - name: Type check
        run: yarn type-check
      - name: Run tests
        run: yarn test

  release:
    needs: validate
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Enable Corepack
        run: corepack enable
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: yarn
      - name: Install dependencies
        run: yarn install --immutable

      - name: Derive version and verify it matches package.json
        id: meta
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          echo "version=$TAG" >> "$GITHUB_OUTPUT"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag v$TAG does not match package.json version $PKG — bump package.json before tagging."
            exit 1
          fi

      - name: Package all browser zips
        run: yarn zip:all

      - name: Extract changelog section for this version
        env:
          VERSION: ${{ steps.meta.outputs.version }}
          REPO: ${{ github.repository }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          # Print lines after "## [VERSION]" up to (not including) the next "## [" header.
          awk -v tag="## [$VERSION]" 'index($0,tag)==1 {f=1; next} /^## \[/ && f {exit} f' CHANGELOG.md > RELEASE_NOTES.md
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "Release $VERSION" > RELEASE_NOTES.md
          fi
          {
            echo ""
            echo "**Full diff:** https://github.com/$REPO/commits/$REF_NAME"
          } >> RELEASE_NOTES.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
          files: .output/*.zip
          fail_on_unmatched_files: true

  publish-chrome:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Enable Corepack
        run: corepack enable
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: yarn
      - name: Install dependencies
        run: yarn install --immutable
      - name: Package Chrome zip
        run: yarn zip

      - name: Check Chrome Web Store secrets are set
        id: guard
        env:
          EXT_ID: ${{ secrets.CHROME_EXTENSION_ID }}
        run: |
          if [ -n "$EXT_ID" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::warning::CHROME_* secrets not configured — skipping Chrome Web Store publish."
          fi

      - name: Publish to Chrome Web Store
        if: steps.guard.outputs.ready == 'true'
        uses: mnao305/chrome-webstore-upload-action@v5.0.0
        with:
          file-path: .output/media-bulk-downloads-${{ needs.release.outputs.version }}-chrome.zip
          extension-id: ${{ secrets.CHROME_EXTENSION_ID }}
          client-id: ${{ secrets.CHROME_CLIENT_ID }}
          client-secret: ${{ secrets.CHROME_CLIENT_SECRET }}
          refresh-token: ${{ secrets.CHROME_REFRESH_TOKEN }}
          publish: true
