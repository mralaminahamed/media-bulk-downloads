name: Release

# Fires when a version tag is pushed (e.g. `v1.1.0`). It re-validates, packages
# all browser zips, publishes a GitHub Release with them attached, and pushes the
# Chrome build to the Chrome Web Store.
#
# Can also be run manually (Actions → Release → Run workflow) to publish the
# CURRENT package.json version to the Chrome Web Store without a new tag — the
# GitHub-Release step is skipped in that mode (the release already exists), only
# the store publish runs.
#
# Required repository secrets for the Chrome Web Store publish (Settings →
# Secrets and variables → Actions). If they are absent the publish step is
# SKIPPED (the release still succeeds), so the workflow is safe to add before
# the secrets exist:
#   CHROME_EXTENSION_ID    the item id (jmdhkdengijmmkelofaleinbipophckn)
#   CHROME_CLIENT_ID       OAuth client id  (Chrome Web Store API)
#   CHROME_CLIENT_SECRET   OAuth client secret
#   CHROME_REFRESH_TOKEN   OAuth refresh token
# See docs/store-submissions/CHROME_WEBSTORE.md and https://developer.chrome.com/docs/webstore/using-api

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch: # manual publish of the current package.json version

permissions:
  contents: write # create the GitHub Release + upload assets

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Enable Corepack
        run: corepack enable
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: yarn
      - name: Install dependencies
        run: yarn install --immutable
      - name: Lint
        run: yarn lint
      - name: Type check
        run: yarn type-check
      - name: Run tests
        run: yarn test

  release:
    needs: validate
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Enable Corepack
        run: corepack enable
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: yarn
      - name: Install dependencies
        run: yarn install --immutable

      - name: Derive version
        id: meta
        env:
          EVENT: ${{ github.event_name }}
        run: |
          PKG="$(node -p "require('./package.json').version")"
          if [ "$EVENT" = "push" ]; then
            # Tag push: version comes from the tag and must match package.json.
            TAG="${GITHUB_REF_NAME#v}"
            if [ "$TAG" != "$PKG" ]; then
              echo "::error::Tag v$TAG does not match package.json version $PKG — bump package.json before tagging."
              exit 1
            fi
            echo "version=$TAG" >> "$GITHUB_OUTPUT"
          else
            # Manual dispatch: publish whatever package.json currently declares.
            echo "version=$PKG" >> "$GITHUB_OUTPUT"
          fi

      - name: Package all browser zips
        if: github.event_name == 'push'
        run: yarn zip:all

      - name: Extract changelog section for this version
        if: github.event_name == 'push'
        env:
          VERSION: ${{ steps.meta.outputs.version }}
          REPO: ${{ github.repository }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          # Print lines after "## [VERSION]" up to (not including) the next "## [" header.
          awk -v tag="## [$VERSION]" 'index($0,tag)==1 {f=1; next} /^## \[/ && f {exit} f' CHANGELOG.md > RELEASE_NOTES.md
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "Release $VERSION" > RELEASE_NOTES.md
          fi
          {
            echo ""
            echo "**Full diff:** https://github.com/$REPO/commits/$REF_NAME"
          } >> RELEASE_NOTES.md

      - name: Create GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          name: ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
          files: .output/*.zip
          fail_on_unmatched_files: true

  publish-chrome:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Enable Corepack
        run: corepack enable
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: yarn
      - name: Install dependencies
        run: yarn install --immutable
      - name: Package Chrome zip
        run: yarn zip

      - name: Check Chrome Web Store secrets are set
        id: guard
        env:
          EXT_ID: ${{ secrets.CHROME_EXTENSION_ID }}
          PUB_ID: ${{ secrets.CHROME_PUBLISHER_ID }}
        run: |
          if [ -n "$EXT_ID" ] && [ -n "$PUB_ID" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::warning::CHROME_EXTENSION_ID and/or CHROME_PUBLISHER_ID not set — skipping Chrome Web Store publish."
          fi

      # Official CLI, always latest. Its current `chrome-webstore-upload` (v6)
      # dependency requires a PUBLISHER_ID in addition to the OAuth creds — that
      # newly-required input is what broke v1.2.0 (the workflow predated it). It
      # reads EXTENSION_ID / CLIENT_ID / CLIENT_SECRET / REFRESH_TOKEN and the
      # developer account's PUBLISHER_ID from the environment.
      - name: Publish to Chrome Web Store
        if: steps.guard.outputs.ready == 'true'
        env:
          EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
          PUBLISHER_ID: ${{ secrets.CHROME_PUBLISHER_ID }}
          CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
          VERSION: ${{ needs.release.outputs.version }}
        run: |
          npx --yes chrome-webstore-upload-cli@latest upload \
            --source ".output/media-bulk-downloads-${VERSION}-chrome.zip" \
            --auto-publish
