name: Release

# Fires when a version tag is pushed (e.g. `v1.2.0`). It re-validates, packages
# all browser zips, publishes a GitHub Release with them attached, and pushes the
# Chrome build to the Chrome Web Store via Google's official REST API (no
# third-party package — plain curl against the documented endpoints:
# https://developer.chrome.com/docs/webstore/using-api).
#
# Can also be run manually (Actions → Release → Run workflow) to re-publish the
# CURRENT package.json version to the Chrome Web Store without a new tag; the
# GitHub-Release steps are skipped in that mode.
#
# Chrome Web Store secrets (Settings → Secrets and variables → Actions). Absent →
# the publish job SKIPS with a warning (the release still succeeds):
#   CHROME_EXTENSION_ID    the item id (jmdhkdengijmmkelofaleinbipophckn)
#   CHROME_CLIENT_ID       OAuth client id  (Chrome Web Store API enabled)
#   CHROME_CLIENT_SECRET   OAuth client secret
#   CHROME_REFRESH_TOKEN   OAuth refresh token (from the account that OWNS the item)

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch: # manual re-publish of the current package.json version

permissions:
  contents: write # create the GitHub Release + upload assets

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Enable Corepack
        run: corepack enable
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: yarn
      - name: Install dependencies
        run: yarn install --immutable
      - name: Lint
        run: yarn lint
      - name: Type check
        run: yarn type-check
      - name: Run tests
        run: yarn test

  release:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Enable Corepack
        run: corepack enable
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: yarn
      - name: Install dependencies
        run: yarn install --immutable

      - name: Verify tag matches package.json
        if: github.event_name == 'push'
        run: |
          PKG="$(node -p "require('./package.json').version")"
          TAG="${GITHUB_REF_NAME#v}"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag v$TAG does not match package.json version $PKG — bump package.json before tagging."
            exit 1
          fi

      - name: Package all browser zips
        if: github.event_name == 'push'
        run: yarn zip:all

      - name: Extract changelog section for this version
        if: github.event_name == 'push'
        env:
          REF_NAME: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          V="${REF_NAME#v}"
          awk -v tag="## [$V]" 'index($0,tag)==1 {f=1; next} /^## \[/ && f {exit} f' CHANGELOG.md > RELEASE_NOTES.md
          if [ ! -s RELEASE_NOTES.md ]; then
            echo "Release $V" > RELEASE_NOTES.md
          fi
          {
            echo ""
            echo "**Full diff:** https://github.com/$REPO/commits/$REF_NAME"
          } >> RELEASE_NOTES.md

      - name: Create GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2.6.2
        with:
          name: ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
          files: .output/*.zip
          fail_on_unmatched_files: true

  publish-chrome:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Enable Corepack
        run: corepack enable
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: yarn
      - name: Install dependencies
        run: yarn install --immutable
      - name: Package Chrome zip
        run: yarn zip

      - name: Check Chrome Web Store secrets are set
        id: guard
        env:
          EXT_ID: ${{ secrets.CHROME_EXTENSION_ID }}
          CID: ${{ secrets.CHROME_CLIENT_ID }}
          CSECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          RTOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
        run: |
          if [ -n "$EXT_ID" ] && [ -n "$CID" ] && [ -n "$CSECRET" ] && [ -n "$RTOKEN" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Chrome Web Store secrets not fully set — skipping publish."
          fi

      # Publish through Google's official Chrome Web Store API directly (no npm
      # package): OAuth token refresh → item-scoped v1.1 upload → publish. The
      # v1.1 item endpoint needs only the item id (no publisher id). Docs:
      # https://developer.chrome.com/docs/webstore/using-api
      - name: Publish to Chrome Web Store (official API)
        if: steps.guard.outputs.ready == 'true'
        env:
          EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
          CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="$(node -p "require('./package.json').version")"
          ZIP=".output/media-bulk-downloads-${VERSION}-chrome.zip"
          [ -f "$ZIP" ] || { echo "::error::$ZIP not found"; exit 1; }

          echo "Requesting access token…"
          RESP="$(curl -s -X POST https://oauth2.googleapis.com/token \
            -d "client_id=${CLIENT_ID}" \
            -d "client_secret=${CLIENT_SECRET}" \
            -d "refresh_token=${REFRESH_TOKEN}" \
            -d "grant_type=refresh_token")"
          TOKEN="$(echo "$RESP" | jq -r '.access_token // empty')"
          if [ -z "$TOKEN" ]; then
            # Print only the error fields (never the token) so the cause is visible.
            echo "OAuth token error: $(echo "$RESP" | jq -c '{error, error_description}' 2>/dev/null || echo "$RESP")"
            echo "::error::Could not obtain an access token (check CLIENT_ID/SECRET/REFRESH_TOKEN, and that the OAuth client is a 'Web application' with the Chrome Web Store API enabled)."
            exit 1
          fi

          echo "Uploading ${ZIP}…"
          UP="$(curl -s -X PUT \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "x-goog-api-version: 2" \
            -T "$ZIP" \
            "https://www.googleapis.com/upload/chromewebstore/v1.1/items/${EXTENSION_ID}")"
          echo "$UP"
          STATE="$(echo "$UP" | jq -r '.uploadState // empty')"
          if [ "$STATE" != "SUCCESS" ]; then
            echo "::error::Upload did not succeed (uploadState=$STATE). See response above."
            exit 1
          fi

          echo "Publishing…"
          PUB="$(curl -s -X POST \
            -H "Authorization: Bearer ${TOKEN}" \
            -H "x-goog-api-version: 2" \
            -H "Content-Length: 0" \
            "https://www.googleapis.com/chromewebstore/v1.1/items/${EXTENSION_ID}/publish")"
          echo "$PUB"
          # status is an array; OK or ITEM_PENDING_REVIEW both mean the publish was accepted.
          if echo "$PUB" | jq -e '[.status[]] | any(. == "OK" or . == "ITEM_PENDING_REVIEW")' >/dev/null 2>&1; then
            echo "Chrome Web Store publish accepted."
          else
            echo "::error::Publish was rejected. See response above."
            exit 1
          fi
