name: Extension CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Lint / type-check / tests run in test.yml. This workflow produces the built,
# unpacked extension as a downloadable artifact.
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: yarn

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build extension
        run: yarn build

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
