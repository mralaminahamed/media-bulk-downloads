<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
    <!-- Background -->
    <rect x="0" y="0" width="100" height="100" fill="#f0f0f0" rx="20" ry="20"/>

    <!-- Stack of images -->
    <rect x="20" y="20" width="60" height="45" fill="#4F46E5" rx="5" ry="5"/>
    <rect x="25" y="15" width="60" height="45" fill="#14B8A6" rx="5" ry="5"/>
    <rect x="30" y="10" width="60" height="45" fill="#6B7280" rx="5" ry="5"/>

    <!-- Download arrow -->
    <path d="M60 40 L60 70 L50 60 M60 70 L70 60" stroke="#ffffff" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Small circles representing image content -->
    <circle cx="45" cy="25" r="5" fill="#ffffff"/>
    <circle cx="75" cy="35" r="8" fill="#ffffff" opacity="0.6"/>
</svg>
