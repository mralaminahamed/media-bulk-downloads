<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Pinterest</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Sample Pinterest board fixture for e2e media collection tests." />
  <meta property="og:title" content="Pinterest Fixture" />
  <meta property="og:type" content="website" />
  <!-- og:image already at /originals/ — resolver leaves it unchanged -->
  <meta property="og:image" content="https://i.pinimg.com/originals/45/79/16/OGPIN0000000000000000000000000000.jpg">
</head>
<body>
  <header>
    <nav>
      <a href="/">Home</a>
      <a href="#">Today</a>
      <a href="#">Explore</a>
    </nav>
    <h1>Pinterest Board</h1>
  </header>
  <main role="main">
    <h2>Pins</h2>
    <!-- Still pin: the SAME image served at 236x + 474x (srcset) + 736x -> all collapse
         to one /originals/ item. Real image hash captured from a live pin. -->
    <div data-test-id="pin" role="listitem">
      <a href="/pin/84301824269690044/">
        <img alt="Recipe pin"
           src="https://i.pinimg.com/236x/45/79/16/45791643dd397b203c0306f076d94e0b.jpg"
           srcset="https://i.pinimg.com/474x/45/79/16/45791643dd397b203c0306f076d94e0b.jpg 2x,
                   https://i.pinimg.com/736x/45/79/16/45791643dd397b203c0306f076d94e0b.jpg 3x">
      </a>
    </div>
    <p>A recipe pin with responsive size variants.</p>

    <!-- A different still pin shown at two sizes (564x + 736x) -> one /originals/ item. -->
    <div data-test-id="pin" role="listitem">
      <a href="/pin/111222333444/"><img alt="Craft" src="https://i.pinimg.com/564x/aa/bb/cc/BBBB1111222233334444555566667777.jpg"></a>
    </div>
    <div data-test-id="pin" role="listitem">
      <a href="/pin/111222333444/"><img alt="Craft large" src="https://i.pinimg.com/736x/aa/bb/cc/BBBB1111222233334444555566667777.jpg"></a>
    </div>
    <p>A craft pin rendered twice at different card sizes.</p>

    <!-- Video pin: an i.pinimg poster inside a cell that also holds a <video> (durable
         signal) and the pin's /pin/<id>/ link -> a pending Video-kind item, never a still. -->
    <div data-test-id="pin" role="listitem">
      <a href="/pin/84301824269690044/">
        <img alt="Video pin poster" src="https://i.pinimg.com/736x/62/b7/a5/62b7a5ecc1b483e99a3456ef9c2f7861.jpg">
        <video poster="https://i.pinimg.com/736x/62/b7/a5/62b7a5ecc1b483e99a3456ef9c2f7861.jpg"></video>
      </a>
    </div>
    <p>A video pin identified by its poster and inline video element.</p>
  </main>
  <footer>
    <p>Fixture data for automated testing only.</p>
  </footer>
</body>
</html>
