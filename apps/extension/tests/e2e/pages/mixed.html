<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="A fixture mixing base64 and URL-encoded inline SVG images with an external video and audio file." />
    <meta property="og:title" content="MBD e2e — mixed" />
    <meta property="og:type" content="website" />
    <title>MBD e2e — mixed</title>
  </head>
  <body>
    <header>
      <nav>
        <a href="/">Home</a>
        <a href="#">Media</a>
      </nav>
      <h1>Mixed media</h1>
    </header>
    <main>
      <h2>Inline images</h2>
      <!-- Genuinely base64-encoded (not just URL-encoded) so collection computes a
           real fileSize (~118 bytes) via getBase64ImageSize — needed for the
           min-size floor test, the only item in this fixture with a known size. -->
      <img alt="Img1" width="120" height="120" src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxMjAiIGhlaWdodD0iMTIwIj48cmVjdCB3aWR0aD0iMTIwIiBoZWlnaHQ9IjEyMCIgZmlsbD0iI2UxMWQ0OCIvPjwvc3ZnPg==" />
      <img alt="Img2" width="120" height="120" src="data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22120%22%20height%3D%22120%22%3E%3Crect%20width%3D%22120%22%20height%3D%22120%22%20fill%3D%22%2316a34a%22%2F%3E%3C%2Fsvg%3E" />
      <h2>External clip</h2>
      <p>A short video hosted on an external CDN.</p>
      <video alt="Clip" width="160" height="90" src="https://cdn.example.com/videos/clip-720.mp4"></video>
      <h3>Background audio</h3>
      <audio src="https://cdn.example.com/audio/song.mp3"></audio>
      <p>An accompanying audio track for the clip above.</p>
    </main>
    <footer>
      <p>MBD e2e fixtures &mdash; mixed media types.</p>
    </footer>
  </body>
</html>
